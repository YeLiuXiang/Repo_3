name: 创建任务 Issues

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/create-issues.yml'

permissions:
  issues: write

jobs:
  create-issues:
    runs-on: ubuntu-latest
    steps:
      - name: 创建 Labels
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          create_label() {
            local name="$1" color="$2" description="$3"
            gh label create "$name" --color "$color" --description "$description" --repo "$REPO" 2>/dev/null || \
            gh label edit "$name" --color "$color" --description "$description" --repo "$REPO" 2>/dev/null || true
          }
          create_label "task" "5319E7" "所有 Task Issue"
          create_label "stage: setup" "EDEDED" "阶段一：环境搭建"
          create_label "stage: foundation" "BFD4F2" "阶段二：基础模块"
          create_label "stage: feature" "0075CA" "用户故事功能任务"
          create_label "stage: polish" "E4E669" "收尾与横向关注点"
          create_label "priority: p1" "B60205" "高优先级"
          create_label "priority: p2" "D93F0B" "中优先级"
          create_label "priority: p3" "FBCA04" "低优先级"
          create_label "us-01" "0E8A16" "US-01: 关键词数据采集任务"
          create_label "us-02" "0E8A16" "US-02: 内容热度趋势分析"
          create_label "us-03" "0E8A16" "US-03: 品牌关键词情感分析"
          create_label "us-04" "0E8A16" "US-04: 多平台数据对比报告导出"
          create_label "us-05" "0E8A16" "US-05: 采集任务定时调度"
          create_label "us-06" "0E8A16" "US-06: 热门内容榜单浏览"
          create_label "us-07" "0E8A16" "US-07: 用户账号与权限管理"

      - name: 创建 Issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          create_issue() {
            local title="$1"
            local body="$2"
            local labels="$3"
            existing=$(gh issue list --repo "$REPO" --state open --search "in:title" --json title,state --jq ".[].title" 2>/dev/null | grep -Fx "$title" | head -1)
            if [ -n "$existing" ]; then
              echo "⏭️  跳过（已存在）：$title"
            else
              gh issue create --repo "$REPO" --title "$title" --body "$body" --label "$labels"
              echo "✅ 已创建：$title"
            fi
          }

          # T-001
          create_issue \
            '[TASK] T-001: 初始化项目目录结构' \
            "$(cat << 'ISSUEBODY'
## 任务描述

初始化项目目录结构（pyproject.toml / requirements.txt、src/ 分层布局：api/services/models/collectors/utils/dashboard/workers）

**目标文件**：`项目根目录`
**所属阶段**：阶段一：环境搭建
**关联用户故事**：无

---

